<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Welcome to my portfolio website. Here you will find my projects, skills, and contact information.">
    <title>Work With Liv</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Header Styles */
        header {
            background-color: var(--primary-color);
            color: var(--secondary-color);
            height: 50px;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .hamburger-menu {
            display: none;
        }

        @media (max-width: 768px) {
            .hamburger-menu {
                display: block;
                text-align: center;
                width: 40px;
                height: 40px;
            }
        }

        /* Main Content Styles */
        main {
            margin-top: 70px; /* Adjusted for fixed header */
        }

        section {
            height: 560px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-wrap: wrap;
        }

        .two-columns {
            display: flex;
            justify-content: space-between;
        }

        .two-columns > div {
            flex: 1;
            margin: 10px;
        }

        .three-columns {
            display: flex;
            justify-content: space-between;
        }

        .three-columns > div {
            flex: 1;
            margin: 10px;
            text-align: center;
        }

        .three-columns img {
            max-width: 100%;
            height: auto;
        }

        .blog-preview {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Olivia Arkema</div>
        <div class="hamburger-menu">
            &#9776;
        </div>
    </header>
    <main>
        <section class="two-columns">
            <div>Photo or Text</div>
            <div>Photo or Text</div>
        </section>
        <section class="two-columns">
            <div>Photo or Text</div>
            <div>Photo or Text</div>
        </section>
        <section class="two-columns">
            <div>Photo or Text</div>
            <div>Photo or Text</div>
        </section>
        <section class="three-columns">
            <div>
                <img src="path/to/image1.jpg" alt="Image 1">
                <p>Text Description 1</p>
            </div>
            <div>
                <img src="path/to/image2.jpg" alt="Image 2">
                <p>Text Description 2</p>
            </div>
            <div>
                <img src="path/to/image3.jpg" alt="Image 3">
                <p>Text Description 3</p>
            </div>
        </section>
        <section class="two-columns">
            <div>Photo or Text</div>
            <div>Photo or Text</div>
        </section>
        <section class="blog-preview">
            <div>Most Recent Blog Post 1</div>
            <div>Most Recent Blog Post 2</div>
        </section>
        <section class="two-columns">
            <div>Photo or Text</div>
            <div>Photo or Text</div>
        </section>
    </main>
</body>
</html>
